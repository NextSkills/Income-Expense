        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);

<body class="font-body bg-background text-on-surface min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
<!-- Abstract Branded Background Elements -->
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[40%] rounded-full bg-secondary-container/20 blur-[100px]"></div>
<!-- Login Container -->
<div class="w-full max-w-[440px] relative z-10">
<!-- Branding/Logo Section -->
<div class="flex flex-col items-center mb-10">
<div class="w-20 h-20 mb-6 bg-surface-container-lowest rounded-xl flex items-center justify-center shadow-xl shadow-primary/5 p-2">
<img alt="Next Skills Academy Logo" class="w-full h-full object-contain rounded-lg" data-alt="Modern professional minimalist logo for Next Skills Academy featuring geometric shapes in deep indigo and white colors" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA1W6QVXLN6s38q4tdN9OcJxcVcCGgibVmTjNlVezyyWhJWRGFmUyP-ylE4enJgcXd2DaEi8NjalIPnO-oGwq9-P8RFzmDuyamygK0YYJAbhJ7hn84z9J6yL29aC3I16yD_zTcK4D1OvLmXInpM5duK7FypipxGS8RDMcMusokhkiB8Gy-X95v7hFujRfPXLvU5Cv9rvzLkLhP9N01QjerxoSAwkN2JNfDfcr4D5r3WVQuG6HFWHtD1e6sxcAgvChI2XgY2y9BNnQ"/>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface text-center">
                    Fiscal Architect
                </h1>
<p class="text-on-surface-variant font-medium mt-2 tracking-wide uppercase text-xs">
                    Operational Excellence
                </p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest p-8 md:p-10 rounded-xl shadow-2xl shadow-on-surface/5 border border-outline-variant/10">
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface-variant ml-1" for="email">
                            Username or Email
                        </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">
                                person
                            </span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline" id="email" name="email" placeholder="architect@nextskills.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label text-sm font-semibold text-on-surface-variant" for="password">
                                Password
                            </label>
<a class="text-xs font-semibold text-primary hover:text-primary-container transition-colors" href="#">
                                Forgot password?
                            </a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">
                                lock
                            </span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Options -->
<div class="flex items-center space-x-2 px-1">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="text-sm text-on-surface-variant font-medium" for="remember">Keep me logged in for 30 days</label>
</div>
<!-- CTA Button -->
<button class="w-full py-4 rounded-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold text-lg shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center space-x-2" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<!-- Alternative Access -->
<div class="mt-8 pt-8 border-t border-surface-container text-center">
<p class="text-on-surface-variant text-sm">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline underline-offset-4" href="#">Contact Administrator</a>
</p>
</div>
</div>
<!-- Footnote -->
<p class="mt-8 text-center text-outline text-xs font-medium">
                © 2024 Next Skills Academy. The Fiscal Architect.
            </p>
</div>
</main>
<!-- Footer Mockup from Shared Components (Condensed for Login) -->
<footer class="w-full py-6 mt-auto flex flex-col md:flex-row justify-between items-center px-8 bg-slate-50 border-t border-slate-100">
<div class="text-slate-400 font-label text-xs tracking-wide">
            © 2024 Next Skills Academy. The Fiscal Architect.
        </div>
<div class="flex space-x-6 mt-4 md:mt-0">
<a class="text-slate-400 hover:text-slate-600 text-xs font-medium transition-colors" href="#">Privacy Policy</a>
<a class="text-slate-400 hover:text-slate-600 text-xs font-medium transition-colors" href="#">Terms of Service</a>
<a class="text-slate-400 hover:text-slate-600 text-xs font-medium transition-colors" href="#">Support</a>
</div>
</footer>
