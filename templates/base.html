<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}Next Skills Academy{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-container": "#cea700",
                        "outline-variant": "#c7c4d8",
                        "inverse-on-surface": "#ebf1ff",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed": "#231b00",
                        "surface-tint": "#4d44e3",
                        "background": "#f8f9ff",
                        "on-secondary-fixed-variant": "#3a485c",
                        "on-tertiary-fixed-variant": "#574500",
                        "secondary-container": "#d5e3fd",
                        "on-primary-fixed": "#0f0069",
                        "tertiary-fixed-dim": "#eec200",
                        "primary-fixed-dim": "#c3c0ff",
                        "on-secondary-container": "#57657b",
                        "surface-container-low": "#eff4ff",
                        "surface-container-high": "#dde9ff",
                        "secondary": "#515f74",
                        "tertiary": "#735c00",
                        "secondary-fixed": "#d5e3fd",
                        "on-surface-variant": "#464555",
                        "primary": "#3525cd",
                        "on-background": "#0d1c2f",
                        "on-tertiary": "#ffffff",
                        "surface": "#f8f9ff",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#b9c7e0",
                        "primary-fixed": "#e2dfff",
                        "surface-container-highest": "#d5e3fd",
                        "on-surface": "#0d1c2f",
                        "on-secondary-fixed": "#0d1c2f",
                        "surface-variant": "#d5e3fd",
                        "outline": "#777587",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#4e3e00",
                        "surface-container": "#e6eeff",
                        "surface-bright": "#f8f9ff",
                        "surface-dim": "#ccdbf4",
                        "on-primary-fixed-variant": "#3323cc",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ffe083",
                        "primary-container": "#4f46e5",
                        "inverse-surface": "#233144",
                        "inverse-primary": "#c3c0ff",
                        "error-container": "#ffdad6",
                        "on-primary-container": "#dad7ff"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="bg-background text-on-surface min-h-screen">

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="fixed top-4 right-4 z-[100] space-y-2">
        {% for category, message in messages %}
        <div class="flash-message px-6 py-3 rounded-xl shadow-lg text-sm font-semibold
            {% if category == 'error' %}bg-error-container text-on-error-container
            {% elif category == 'success' %}bg-emerald-100 text-emerald-800
            {% else %}bg-primary-fixed text-on-primary-fixed{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    {% block body %}{% endblock %}

</body>
</html>
